{% include base_path %}

<section id="photos">
    <br/>
    {% for post in site.publications reversed %}
        {% if post.image %}

                <a href = "{{ post.permalink }}" title="{{ post.title }}" >
                    <img src="{{ post.image }}" alt="Image" width = "350"/>
                </a>

        {%endif%} 
    {% endfor %}
</section>
